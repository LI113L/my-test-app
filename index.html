<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>超准性格测试</title>
    <style>
        body {

            margin: 40px auto;

        button {

            cursor: pointer;

        <h1>超准性格测试</h1>
        <p>本测试仅供娱乐</p>

</html>
